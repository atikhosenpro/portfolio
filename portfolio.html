.grid-item {
    background: linear-gradient(135deg, var(--color-bg-secondary) 0%, rgb(11, 3, 34) 100%);
    border-radius: 12px;
    box-shadow: 0 4px 15px var(--color-shadow-light), 0 1px 3px var(--color-shadow-medium);
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
    position: relative;
    margin-bottom: 20px;
    border: 2px solid var(--color-border-light);
    display: flex;
    flex-direction: column;
    height: 100%;
}

.grid-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--gradient-primary);
    border-radius: 12px 12px 0 0;
}

.grid-item.Elearning::before {
    background: linear-gradient(90deg, var(--color-industry-elearning) 0%, var(--color-primary) 100%);
}

.grid-item.Business::before {
    background: linear-gradient(90deg, var(--color-industry-business) 0%, var(--color-primary-light) 100%);
}

.grid-item.Membership::before {
    background: linear-gradient(90deg, var(--color-industry-membership) 0%, var(--color-success) 100%);
}

.grid-item:hover {
    box-shadow: 0 12px 30px var(--color-shadow-heavy), 0 4px 8px var(--color-shadow-medium);
    border-color: var(--color-primary);
    transform: translateY(-8px);
    background: linear-gradient(135deg, rgba(15, 33, 48, 0.98) 0%, rgba(8, 16, 38, 0.98) 100%);
}

.grid-item:hover .grid-checkbox{
    opacity: 1;
}

.grid-item:hover img.grid-thumbnail{
    object-position: bottom;
    transform: scale(1.08);
    transition: 4s;
}

.grid-item.selected {
    border-color: var(--color-primary);
    box-shadow: 0 8px 20px var(--color-shadow-heavy);
}

.grid-thumbnail {
    width: 100%;
    height: 200px;
    object-fit: cover;
    object-position: top;
    transition: transform 4s ease-out;
    display: block;
}

.grid-content {
    padding: 18px;
    border-top: 1px solid var(--color-border-light);
    flex-grow: 1;
    display: flex;
    flex-direction: column;
}

.grid-title {
    font-weight: var(--font-weight-bold);
    font-size: var(--font-size-lg);
    margin-bottom: 12px;
    color: var(--color-text-primary);
    word-break: break-word;
    line-height: 1.4;
}

.select-all-container label {
    color: var(--color-text-primary);
}

.grid-url {
    display: flex;
    align-items: center;
    gap: 5px;
}

.grid-details {
    margin-bottom: 10px;
    display: none;
}

.grid-detail-item {
    display: flex;
    margin-bottom: 5px;
    font-size: var(--font-size-base);
}

.grid-detail-label {
    font-weight: var(--font-weight-semibold);
    min-width: 80px;
    color: var(--color-text-dark);
}

.grid-detail-value {
    color: var(--color-text-dark-strong);
    flex: 1;
}

.grid-checkbox {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 10;
    transform: scale(1.3);
    opacity: 0;
    transition: opacity 0.3s ease;
}

                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            if (results.data && results.data.length > 0) {
                                csvData = results.data;
                                processData(csvData);
                            } else {
                                displayError('No data found in the CSV');
                            }
                        },
                        error: function(error) {
                            console.error('Error parsing CSV:', error);
                            displayError('Error loading data. Please try again later.');
                            
                            // Load sample data as fallback
                            loadSampleData();
                        }
                    });
                } catch (error) {
                    console.error('Error fetching CSV data:', error);
                    displayError('Error loading data. Please try again later.');
                    
                    // Load sample data as fallback
                    loadSampleData();
                }
            }

            // Process the CSV data
            function processData(data) {
                // Collect unique values for filters
                data.forEach(row => {
                    if (row.Platform) uniqueValues.platforms.add(row.Platform);
                    if (row.industry) uniqueValues.industries.add(row.industry);
                    if (row.plugins) {
                        const pluginList = row.plugins.split(', ');
                        pluginList.forEach(plugin => uniqueValues.plugins.add(plugin));
                    }
                        
                        
                });
                
                populateFilterOptions();
                applyFilter();
                updateTotalCount();
            }

            function displayError(message) {
                document.getElementById('gridView').innerHTML = 
                    `<div class="no-results text-danger">${message}</div>`;

            // Populate filter dropdowns with unique values
            function populateFilterOptions() {
                const platformFilter = document.getElementById('platformFilter');
                const industryFilter = document.getElementById('industryFilter');
                const pluginFilter = document.getElementById('pluginFilter');
                
                // Clear existing options
                platformFilter.innerHTML = '';
                industryFilter.innerHTML = '';
                pluginFilter.innerHTML = '';
                
                // Add platforms
                uniqueValues.platforms.forEach(platform => {
                    const option = document.createElement('option');
                    option.value = platform;
                    option.textContent = platform;
                    platformFilter.appendChild(option);
                });
                
                // Add industries
                uniqueValues.industries.forEach(industry => {
                    const option = document.createElement('option');
                    option.value = industry;
                    option.textContent = industry;
                    industryFilter.appendChild(option);
                });
                
                // Add plugins
                uniqueValues.plugins.forEach(plugin => {
                    const option = document.createElement('option');
                    option.value = plugin;
                    option.textContent = plugin;
                    pluginFilter.appendChild(option);
                });
                
                // Refresh bootstrap-select
                $('.selectpicker').selectpicker('refresh');
            }

            // Apply filters to the data
            function applyFilter() {
                const platformValues = $('#platformFilter').val() || [];
                const industryValues = $('#industryFilter').val() || [];
                const pluginValues = $('#pluginFilter').val() || [];
                const searchValue = document.getElementById('searchFilter').value.toLowerCase();
                const itemLimit = parseInt(document.getElementById('itemLimit').value) || 10;
                
                filteredData = csvData.filter(row => {
                    // Platform filter
                    const platformMatch = platformValues.length === 0 || platformValues.includes(row.Platform);
                    
                    // Industry filter
                    const industryMatch = industryValues.length === 0 || industryValues.includes(row.industry);
                    
                    // Plugin filter
                    let pluginMatch = false;
                    if (pluginValues.length === 0) {
                        pluginMatch = true;
                    } else if (row.plugins) {
                        const rowPlugins = row.plugins.split(', ');
                        pluginMatch = pluginValues.some(plugin => rowPlugins.includes(plugin));
                    }
                    
                    // Search filter
                    const searchMatch = searchValue === '' || 
                        Object.values(row).some(value => 
                            value && value.toString().toLowerCase().includes(searchValue)
                        );
                    
                    return platformMatch && industryMatch && pluginMatch && searchMatch;
                });
                
                // Apply item limit
                displayedData = filteredData.slice(0, itemLimit);
                
                displayData(displayedData);
                updateActiveFilters(platformValues, industryValues, pluginValues, searchValue);
                updateTotalCount();
                updateSelectionInfo();
            }

            // Randomize the displayed data order
            function randomizeDisplayedData() {
                // Clear selection when randomizing
                selectedItems.clear();
                
                // Shuffle the filtered data using Fisher-Yates algorithm
                for (let i = filteredData.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [filteredData[i], filteredData[j]] = [filteredData[j], filteredData[i]];
                }
                
                // Apply item limit after shuffling
                const itemLimit = parseInt(document.getElementById('itemLimit').value) || 10;
                displayedData = filteredData.slice(0, itemLimit);
                
                displayData(displayedData);
                updateTotalCount();
                updateSelectionInfo();
                
                // Uncheck the select all checkbox
                document.getElementById('selectAll').checked = false;
            }

            // Update active filters display
            function updateActiveFilters(platforms, industries, plugins, search) {
                const activeFiltersContainer = document.getElementById('activeFilters');
                activeFiltersContainer.innerHTML = '';
                
                if (platforms.length > 0) {
                    platforms.forEach(platform => {
                        activeFiltersContainer.innerHTML += `
                            <span class="badge bg-primary filter-pill">
                                ${platform} 
                            </span>
                        `;
                    });
                }
                
                if (industries.length > 0) {
                    industries.forEach(industry => {
                        activeFiltersContainer.innerHTML += `
                            <span class="badge bg-info text-dark filter-pill">
                                ${industry} 
                            </span>
                        `;
                    });
                }
                
                if (plugins.length > 0) {
                    plugins.forEach(plugin => {
                        activeFiltersContainer.innerHTML += `
                            <span class="badge bg-warning text-dark filter-pill">
                               ${plugin} 
                            </span>
                        `;
                    });
                }
                
                if (search) {
                    activeFiltersContainer.innerHTML += `
                        <span class="badge bg-success filter-pill">
                            Search: "${search}" <span class="ms-1 remove-filter" data-type="search">X</span>
                        </span>
                    `;
                }
                
                // Add event listeners to remove filter buttons
                document.querySelectorAll('.remove-filter').forEach(button => {
                    button.addEventListener('click', function() {
                        const filterType = this.getAttribute('data-type');
                        const filterValue = this.getAttribute('data-value');
                        
                        if (filterType === 'platform') {
                            $('#platformFilter').selectpicker('deselect', filterValue);
                        } else if (filterType === 'industry') {
                            $('#industryFilter').selectpicker('deselect', filterValue);
                        } else if (filterType === 'plugin') {
                            $('#pluginFilter').selectpicker('deselect', filterValue);
                        } else if (filterType === 'search') {
                            document.getElementById('searchFilter').value = '';
                        }
                        
                        applyFilter();
                    });
                });
            }

            // Update total count display
            function updateTotalCount() {
                const totalCount = document.getElementById('totalCount');
                const itemLimit = parseInt(document.getElementById('itemLimit').value) || 10;
                const displayCount = Math.min(filteredData.length, itemLimit);
                
                totalCount.textContent = `${displayCount} of ${filteredData.length} ${filteredData.length === 1 ? 'item' : 'items'}`;
                
                if (filteredData.length > itemLimit) {
                    totalCount.textContent += ` (limited to ${itemLimit})`;
                }
            }

            // Update selection info display
            function updateSelectionInfo() {
                const selectionInfo = document.getElementById('selectionInfo');
                if (selectedItems.size === 0) {
                    selectionInfo.textContent = 'No items selected. Use checkboxes to select items for copying.';
                } else {
                    selectionInfo.textContent = `${selectedItems.size} ${selectedItems.size === 1 ? 'item' : 'items'} selected for copying.`;
                }
            }

            // Update select all checkbox state
            function updateSelectAllCheckbox() {
                const selectAllCheckbox = document.getElementById('selectAll');
                const allCheckboxes = document.querySelectorAll('.row-checkbox');
                
                if (allCheckboxes.length === 0) {
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                    return;
                }
                
                const checkedCount = document.querySelectorAll('.row-checkbox:checked').length;
                
                if (checkedCount === 0) {
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = false;
                } else if (checkedCount === allCheckboxes.length) {
                    selectAllCheckbox.checked = true;
                    selectAllCheckbox.indeterminate = false;
                } else {
                    selectAllCheckbox.checked = false;
                    selectAllCheckbox.indeterminate = true;
                }
            }

            // Copy selected links to clipboard with numbering
            function copySelectedLinksToClipboard() {
                if (selectedItems.size === 0) {
                    alert('No items selected! Please select items using the checkboxes.');
                    return;
                }
                
                // Create numbered list of selected URLs
                const links = Array.from(selectedItems).map((url, index) => {
                    return `${index + 1}. ${url}`;
                }).join('\n');
                
                navigator.clipboard.writeText(links).then(() => {
                    // Show success feedback
                    const copyButton = document.getElementById('copyLinks');
                    const originalText = copyButton.innerHTML;
                    copyButton.innerHTML = '<i class="fas fa-check me-1"></i>Copied!';
                    copyButton.classList.add('highlight');
                    
                    setTimeout(() => {
                        copyButton.innerHTML = originalText;
                        copyButton.classList.remove('highlight');
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy links: ', err);
                    alert('Failed to copy links to clipboard.');
                });
            }

            // Select or deselect all displayed items
            function toggleSelectAll(selectAll) {
                const checkboxes = document.querySelectorAll('.row-checkbox');
                const gridItems = document.querySelectorAll('.grid-item');
                
                checkboxes.forEach((checkbox, index) => {
                    const url = checkbox.getAttribute('data-url');
                    checkbox.checked = selectAll;
                    
                    if (selectAll) {
                        selectedItems.add(url);
                        gridItems[index].classList.add('selected');
                    } else {
                        selectedItems.delete(url);
                        gridItems[index].classList.remove('selected');
                    }
                });
                
                updateSelectionInfo();
            }

        <script>
        // --- Iframe Preview Modal Logic ---
        const iframePreviewModal = document.getElementById('iframePreviewModal');
        const iframeModalContent = document.getElementById('iframeModalContent');
        const iframeModalTitle = document.getElementById('iframeModalTitle');
        const iframeModalBody = document.getElementById('iframeModalBody');
        const iframeLoadingSpinner = document.getElementById('iframeLoadingSpinner');
        const iframeModalClose = document.getElementById('iframeModalClose');
        const viewDesktopBtn = document.getElementById('iframeViewDesktop');
        const viewTabletBtn = document.getElementById('iframeViewTablet');
        const viewMobileBtn = document.getElementById('iframeViewMobile');

        let currentIframe = null;
        let currentUrl = '';

        function setIframeModalWidth(mode) {
            if (mode === 'desktop') {
                iframeModalContent.style.width = '100vw';
                viewDesktopBtn.classList.add('active');
                viewTabletBtn.classList.remove('active');
                viewMobileBtn.classList.remove('active');
            } else if (mode === 'tablet') {
                iframeModalContent.style.width = '728px';
                viewDesktopBtn.classList.remove('active');
                viewTabletBtn.classList.add('active');
                viewMobileBtn.classList.remove('active');
            } else if (mode === 'mobile') {
                iframeModalContent.style.width = '420px';
                viewDesktopBtn.classList.remove('active');
                viewTabletBtn.classList.remove('active');
                viewMobileBtn.classList.add('active');
            }
        }

        function openIframePreview(url, title) {
            currentUrl = url;
            iframeModalTitle.textContent = title || 'Live Preview';
            setIframeModalWidth('desktop');
            iframeModalBody.innerHTML = '';
            iframeLoadingSpinner.style.display = 'flex';
            iframeModalBody.appendChild(iframeLoadingSpinner);
            iframePreviewModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            // Remove previous iframe if any
            if (currentIframe) {
                currentIframe.remove();
                currentIframe = null;
            }
            // Create new iframe
            const iframe = document.createElement('iframe');
            iframe.className = 'iframe-preview-frame';
            iframe.src = url;
            iframe.loading = 'eager';
            iframe.style.display = 'none';
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups');
            iframe.setAttribute('referrerpolicy', 'no-referrer');
            // Show spinner until loaded
            iframe.onload = function() {
                setTimeout(() => { // slight delay for smoothness
                    iframeLoadingSpinner.style.display = 'none';
                    iframe.style.display = 'block';
                }, 300);
            };
            // Fallback: hide spinner after 10s if not loaded
            setTimeout(() => {
                if (iframeLoadingSpinner.style.display !== 'none') {
                    iframeLoadingSpinner.style.display = 'none';
                    iframe.style.display = 'block';
                }
            }, 10000);
            iframeModalBody.appendChild(iframe);
            currentIframe = iframe;
        }

        function closeIframePreview() {
            iframePreviewModal.style.display = 'none';
            document.body.style.overflow = '';
            if (currentIframe) {
                currentIframe.remove();
                currentIframe = null;
            }
        }

        iframeModalClose.onclick = closeIframePreview;
        iframePreviewModal.onclick = function(e) {
            if (e.target === iframePreviewModal) closeIframePreview();
        };
        viewDesktopBtn.onclick = function() { setIframeModalWidth('desktop'); };
        viewTabletBtn.onclick = function() { setIframeModalWidth('tablet'); };
        viewMobileBtn.onclick = function() { setIframeModalWidth('mobile'); };
        document.addEventListener('keydown', function(e) {
            if (iframePreviewModal.style.display === 'flex' && (e.key === 'Escape' || e.keyCode === 27)) {
                closeIframePreview();
            }
        });
        </script>
